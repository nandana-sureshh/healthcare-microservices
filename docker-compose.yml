version: "3"

services:

  patient-service:
    build: ./microservices/patient-service
    ports:
      - "8081:8080"

  doctor-service:
    build: ./microservices/doctor-service
    ports:
      - "8082:8080"

  appointment-service:
    build: ./microservices/appointment-service
    ports:
      - "8083:8080"

  medical-record-service:
    build: ./microservices/medical-record-service
    ports:
      - "8084:8080"

  billing-service:
    build: ./microservices/billing-service
    ports:
      - "8085:8080"
